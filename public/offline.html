<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capstone Project - Offline</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      background: #eef2f5;
      color: #233447;
    }

    .container {
      width: min(100%, 470px);
      background: #ffffff;
      border: 1px solid #dfe5eb;
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(0, 21, 41, 0.09);
      padding: 34px 30px;
      text-align: center;
    }

    .icon {
      width: 58px;
      height: 58px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: #f4f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #e4e9ef;
      position: relative;
    }

    .icon::before {
      content: "";
      width: 24px;
      height: 24px;
      border: 2px solid #001529;
      border-radius: 50%;
      border-left-color: transparent;
      border-top-color: transparent;
      transform: rotate(45deg);
    }

    .icon::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      background: #001529;
      border-radius: 50%;
      top: 16px;
      right: 16px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f4f7fa;
      color: #556372;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #c0392b;
    }

    h1 {
      margin: 0 0 10px;
      color: #001529;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    p {
      margin: 0 0 24px;
      color: #5f6b7a;
      line-height: 1.65;
      font-size: 0.98rem;
    }

    button {
      background: #001529;
      color: #ffffff;
      border: none;
      padding: 11px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 6px 14px rgba(0, 21, 41, 0.12);
    }

    button:hover {
      background: #002a45;
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(0, 21, 41, 0.15);
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .container {
        padding: 24px 20px;
        border-radius: 14px;
      }

      h1 {
        font-size: 1.45rem;
      }

      p {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon" aria-hidden="true"></div>
    <div class="status"><span class="status-dot"></span>Offline Mode</div>
    <h1>You are Offline</h1>
    <p>
      Capstone Project is currently unavailable because there is no network connection.
      Please reconnect to continue using the application.
    </p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
